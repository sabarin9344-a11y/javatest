<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Quiz Master - Interactive Coding Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg-secondary: #0d1120;
  --card: #111827;
  --border: #1e2a3a;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --success: #34d399;
  --danger: #ef4444;
  --warning: #f59e0b;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--bg) 0%, #0f1729 100%);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  overflow-x: hidden;
}

/* ─── LAYOUT ─── */
.container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

.sidebar {
  width: 280px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  position: fixed;
  height: 100vh;
  left: 0;
  top: 0;
}

.main {
  margin-left: 280px;
  width: calc(100% - 280px);
  padding: 30px;
}

/* ─── SIDEBAR ─── */
.logo {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.5px;
}

.logo-icon { font-size: 24px; -webkit-text-fill-color: var(--accent); }

.quiz-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.quiz-item {
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  background: transparent;
  color: var(--text-muted);
  border: none;
  text-align: left;
  font-family: inherit;
}

.quiz-item:hover {
  background: rgba(56, 189, 248, 0.08);
  color: var(--accent);
}

.quiz-item.active {
  background: rgba(56, 189, 248, 0.12);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}

.progress-section {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.progress-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-weight: 700;
}

.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.3s ease;
}

.stats {
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ─── MAIN CONTENT ─── */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.topbar-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.topbar-meta {
  display: flex;
  gap: 12px;
  align-items: center;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(56, 189, 248, 0.12);
  color: var(--accent);
  border: 1px solid rgba(56, 189, 248, 0.2);
}

.quiz-container {
  max-width: 900px;
  margin: 0 auto;
}

.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px;
  margin-bottom: 30px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.question-number {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  font-weight: 700;
  margin-bottom: 8px;
}

.question-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

.code-block {
  background: #080c15;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #cbd5e1;
  line-height: 1.8;
  margin-bottom: 24px;
  overflow-x: auto;
  white-space: pre;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.option {
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  text-align: left;
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
}

.option:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(56, 189, 248, 0.08);
}

.option.selected {
  border-color: var(--accent2);
  background: rgba(129, 140, 248, 0.12);
}

.option.correct {
  border-color: var(--success);
  background: rgba(52, 211, 153, 0.12);
}

.option.incorrect {
  border-color: var(--danger);
  background: rgba(239, 68, 68, 0.12);
}

.option-radio {
  width: 18px;
  height: 18px;
  border: 2px solid currentColor;
  border-radius: 50%;
  flex-shrink: 0;
}

.option.selected .option-radio,
.option.correct .option-radio,
.option.incorrect .option-radio {
  background: currentColor;
  border-color: currentColor;
  box-shadow: inset 0 0 0 3px var(--bg-secondary);
}

.option-text {
  flex: 1;
  word-break: break-word;
}

.option:disabled {
  cursor: not-allowed;
}

.explanation {
  background: rgba(129, 140, 248, 0.08);
  border: 1px solid rgba(129, 140, 248, 0.25);
  border-radius: 10px;
  padding: 16px;
  margin-top: 20px;
  font-size: 13px;
  line-height: 1.7;
  color: #cbd5e1;
  display: none;
}

.explanation.show {
  display: block;
  animation: slideIn 0.3s ease;
}

.explanation-title {
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 8px;
}

.buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.btn {
  padding: 12px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-family: inherit;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #0ea5e9);
  color: #0a0e1a;
}

.btn-primary:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-2px);
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(56, 189, 248, 0.08);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ─── RESULTS VIEW ─── */
.results-view {
  display: none;
  animation: slideIn 0.4s ease;
}

.results-view.show {
  display: block;
}

.results-header {
  text-align: center;
  margin-bottom: 40px;
}

.results-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 16px;
}

.score-circle {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 20px 60px rgba(56, 189, 248, 0.2);
}

.score-number {
  font-size: 64px;
  font-weight: 800;
  color: #0a0e1a;
}

.score-text {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.results-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.result-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  border-left: 4px solid var(--border);
}

.result-item.correct {
  border-left-color: var(--success);
}

.result-item.incorrect {
  border-left-color: var(--danger);
}

.result-question {
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 13px;
}

.result-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 20px;
}

.result-status.correct {
  background: rgba(52, 211, 153, 0.12);
  color: var(--success);
}

.result-status.incorrect {
  background: rgba(239, 68, 68, 0.12);
  color: var(--danger);
}

.result-details {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  font-size: 12px;
}

.result-label {
  color: var(--text-dim);
}

.result-value {
  color: var(--text);
  font-weight: 600;
}

.restart-btn {
  margin: 40px auto 0;
  display: flex;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    z-index: 50;
    transition: transform 0.3s;
  }

  .main {
    margin-left: 0;
    width: 100%;
    padding: 20px;
  }

  .question-card {
    padding: 24px;
  }

  .results-stats {
    grid-template-columns: 1fr;
  }

  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}
</style>
</head>
<body>

<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span>QuizMaster</span>
    </div>

    <div class="quiz-list" id="quizList"></div>

    <div class="progress-section">
      <div class="progress-label">Overall Progress</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="stats">
        <span><span id="answeredCount">0</span> answered</span>
        <span><span id="correctCount">0</span> correct</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Java Mastery Quiz</div>
      <div class="topbar-meta">
        <div class="badge" id="difficultyBadge">Medium</div>
      </div>
    </div>

    <div class="quiz-container">
      <!-- QUESTIONS VIEW -->
      <div id="questionsView">
        <div id="questionContent"></div>
      </div>

      <!-- RESULTS VIEW -->
      <div id="resultsView" class="results-view">
        <div class="results-header">
          <h2 class="results-title">Quiz Complete!</h2>
          <div class="score-circle">
            <div class="score-number" id="finalScore">0</div>
          </div>
          <div class="score-text">out of <span id="totalQuestions">25</span> questions</div>
        </div>

        <div class="results-stats">
          <div class="stat-card">
            <div class="stat-value" id="correctStat">0</div>
            <div class="stat-label">Correct</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="incorrectStat">0</div>
            <div class="stat-label">Incorrect</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="percentageStat">0%</div>
            <div class="stat-label">Score</div>
          </div>
        </div>

        <h3 style="margin: 40px 0 20px; font-size: 18px; font-weight: 700;">Review Your Answers</h3>
        <div class="results-list" id="resultsList"></div>

        <button class="btn btn-primary restart-btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═════════════════════════════════════════
// QUIZ DATA
// ═════════════════════════════════════════

const quizData = [
  {
    id: 1,
    title: "Static & Instance Initialization",
    code: `class Test {
    static {
        System.out.print("Static ");
    }
    {
        System.out.print("Instance ");
    }
    Test() {
        System.out.print("Constructor ");
    }
    public static void main(String[] args) {
        Test t1 = new Test();
        Test t2 = new Test();
    }
}`,
    options: [
      "Static Instance Constructor Static Instance Constructor",
      "Static Instance Constructor Instance Constructor",
      "Static Constructor Instance Constructor Instance Constructor",
      "Instance Static Constructor Instance Constructor"
    ],
    correct: 1,
    explanation: "The static block runs once when the class is loaded. Then for each instance creation, the instance block runs first, followed by the constructor. So: Static (once) → Instance Constructor (for t1) → Instance Constructor (for t2)."
  },

  {
    id: 2,
    title: "Post/Pre Increment Expression Order",
    code: `public class Increment {
    public static void main(String[] args) {
        int i = 10;
        i = i++ + i++ + --i;
        System.out.println(i);
    }
}`,
    options: ["30", "31", "32", "33"],
    correct: 2,
    explanation: "i=10. First i++ returns 10, then i becomes 11. Second i++ returns 11, then i becomes 12. Then --i makes i=11, and returns 11. So: 10 + 11 + 11 = 32."
  },

  {
    id: 3,
    title: "Static vs Instance Method Overriding",
    code: `class Parent {
    static void print() { System.out.print("Parent-Static "); }
    void display() { System.out.print("Parent-Instance "); }
}
class Child extends Parent {
    static void print() { System.out.print("Child-Static "); }
    @Override
    void display() { System.out.print("Child-Instance "); }
}
Parent p = new Child();
p.print();
p.display();`,
    options: [
      "Child-Static Child-Instance",
      "Parent-Static Child-Instance",
      "Child-Static Parent-Instance",
      "Parent-Static Parent-Instance"
    ],
    correct: 1,
    explanation: "Static methods are NOT overridden, they are hidden. The method called depends on the reference type (Parent). Instance methods ARE overridden, so they depend on the actual object type (Child)."
  },

  {
    id: 4,
    title: "Constructor Infinite Recursion",
    code: `class Demo {
    Demo() {
        this(10);
        System.out.print("Default ");
    }
    Demo(int x) {
        this();
        System.out.print("Parameterized ");
    }
    public static void main(String[] args) {
        new Demo();
    }
}`,
    options: [
      "Default Parameterized",
      "Parameterized Default",
      "Compile Time Error",
      "Runtime StackOverflowError"
    ],
    correct: 2,
    explanation: "This creates infinite recursion. Demo() calls this(10) which calls Demo(int). Demo(int) calls this() which calls Demo(). This creates a circular loop → StackOverflowError at runtime."
  },

  {
    id: 5,
    title: "Variable Shadowing & Polymorphism",
    code: `class Super {
    String name = "Super";
    void show() { System.out.print(name + " "); }
}
class Sub extends Super {
    String name = "Sub";
    void show() { System.out.print(name + " "); }
}
Super obj = new Sub();
System.out.print(obj.name + " ");
obj.show();`,
    options: [
      "Sub Sub",
      "Super Sub",
      "Sub Super",
      "Super Super"
    ],
    correct: 1,
    explanation: "Variables are NOT polymorphic. obj.name uses the reference type (Super), so it prints 'Super'. Methods ARE polymorphic, so obj.show() calls the Sub version, printing 'Sub'."
  },

  {
    id: 6,
    title: "Constructor Chaining with Inheritance",
    code: `class Alpha {
    Alpha() { System.out.print("Alpha-0 "); }
    Alpha(int x) { this(); System.out.print("Alpha-1 "); }
}
class Beta extends Alpha {
    Beta() { super(10); System.out.print("Beta-0 "); }
    Beta(int x) { System.out.print("Beta-1 "); }
}
new Beta();
System.out.print("| ");
new Beta(5);`,
    options: [
      "Alpha-0 Alpha-1 Beta-0 | Beta-1",
      "Alpha-0 Alpha-1 Beta-0 | Alpha-0 Beta-1",
      "Beta-0 Alpha-0 | Beta-1 Alpha-0",
      "Alpha-1 Beta-0 | Alpha-1 Beta-1"
    ],
    correct: 1,
    explanation: "new Beta() → super(10) → Alpha(10) → this() → Alpha() → Alpha-0 Alpha-1 → Beta-0. new Beta(5) → Beta(5) → Beta-1 (no super call, but default super() is called first → Alpha-0)."
  },

  {
    id: 7,
    title: "Interface Variable Ambiguity",
    code: `interface A { int VAL = 10; }
interface B { int VAL = 20; }
public class Ambiguity implements A, B {
    public static void main(String[] args) {
        System.out.println(A.VAL);
    }
}`,
    options: ["10", "20", "30", "Compile Error"],
    correct: 0,
    explanation: "When you explicitly reference A.VAL, you get 10. If you tried just VAL, it would be a compile error due to ambiguity. But A.VAL is clear."
  },

  {
    id: 8,
    title: "Default Methods in Multiple Interfaces",
    code: `interface Alpha {
    default void hello() { System.out.print("Alpha "); }
}
interface Beta {
    default void hello() { System.out.print("Beta "); }
}
public class Solution implements Alpha, Beta {
    public void hello() {
        Alpha.super.hello();
        System.out.print("Solution ");
    }
    public static void main(String[] args) {
        new Solution().hello();
    }
}`,
    options: [
      "Beta Solution",
      "Alpha Solution",
      "Alpha Beta Solution",
      "Solution Alpha"
    ],
    correct: 1,
    explanation: "Using Alpha.super.hello() explicitly calls Alpha's default method. Then it prints 'Solution'. Result: Alpha Solution."
  },

  {
    id: 9,
    title: "Static Block Execution Order",
    code: `class Container {
    static int[] data = new int[1];
    static {
        data[0] = 10;
    }
}
public class Main extends Container {
    static {
        data[0] = 20;
    }
    public static void main(String[] args) {
        Container c = new Main();
        System.out.println(c.data[0]);
    }
}`,
    options: ["10", "20", "0", "Null Pointer Exception"],
    correct: 1,
    explanation: "When Main is loaded, Container's static block runs first (data[0]=10), then Main's static block runs (data[0]=20). The value is 20."
  },

  {
    id: 10,
    title: "Array Index Increment in Loop",
    code: `public class LoopIncrement {
    public static void main(String[] args) {
        int count = 0;
        int[][] arr = {{1, 2}, {3, 4}};
        for (int i = 0; i < 2; i++) {
            for (int j = 0; j < 2; j++) {
                if (arr[i][j] % 2 == 0) {
                    count += arr[i++][j];
                }
            }
        }
        System.out.println(count);
    }
}`,
    options: ["2", "4", "6", "8"],
    correct: 0,
    explanation: "When arr[1][0] is accessed, i++ increments i to 2. This causes the inner loop to exit. Only arr[0][0]=1 (odd, skipped) and arr[0][1]=2 (even, count+=2). Result: 2."
  },

  {
    id: 11,
    title: "Array Reference Assignment",
    code: `public class ArrayRef {
    public static void main(String[] args) {
        int[][] matrix = {{1, 1}, {1, 1}};
        int[] row = {2, 2};
        for (int i = 0; i < matrix.length; i++) {
            matrix[i] = row;
            for (int j = 0; j < matrix[i].length; j++) {
                matrix[i][j] += i;
            }
        }
        System.out.println(matrix[0][0] + " " + matrix[1][0]);
    }
}`,
    options: ["2 2", "2 3", "3 3", "4 4"],
    correct: 2,
    explanation: "Both matrix[0] and matrix[1] point to the same 'row' array. When i=0: row becomes {2,2}. When i=1: row becomes {3,3}. Both matrix[0][0] and matrix[1][0] are 3."
  },

  {
    id: 12,
    title: "Short-Circuit Evaluation",
    code: `public class LogicFlow {
    public static void main(String[] args) {
        int i = 0, j = 0;
        boolean result = (i++ > 0) && (++j > 0);
        System.out.println(i + " " + j + " " + result);
    }
}`,
    options: ["1 1 true", "1 0 false", "0 0 true", "1 0 true"],
    correct: 1,
    explanation: "i++ > 0 is false (i becomes 1). Due to &&, the second condition is NOT evaluated (short-circuit). So j remains 0. Result: 1 0 false."
  },

  {
    id: 13,
    title: "Uninitialized Jagged Array",
    code: `public class Jagged {
    public static void main(String[] args) {
        int[][] arr = new int[2][];
        System.out.println(arr[0][0]);
    }
}`,
    options: ["0", "null", "Compile Error", "Runtime NullPointerException"],
    correct: 3,

// ═════════════════════════════════════════
// STATE
// ═════════════════════════════════════════

const state = {
  currentQuestion: 0,
  answers: {},
  showExplanations: {},
  quizComplete: false
};

// ═════════════════════════════════════════
// INITIALIZATION
// ═════════════════════════════════════════

function init() {
  renderQuizList();
  renderQuestion();
}

function renderQuizList() {
  const list = document.getElementById('quizList');
  list.innerHTML = quizData.map((q, i) => `
    <button class="quiz-item ${i === 0 ? 'active' : ''}" onclick="goToQuestion(${i})">
      Q${i + 1}: ${q.title}
    </button>
  `).join('');
}

function renderQuestion() {
  const q = quizData[state.currentQuestion];
  const answered = state.answers[state.currentQuestion] !== undefined;
  const selectedOption = state.answers[state.currentQuestion];

  const html = `
    <div class="question-card">
      <div class="question-number">Question ${state.currentQuestion + 1} of ${quizData.length}</div>
      <div class="question-title">${q.title}</div>
      
      <div class="code-block">${escapeHtml(q.code)}</div>

      <div style="margin-bottom: 20px; font-size: 13px; color: var(--text-muted);">
        What is the output?
      </div>

      <div class="options">
        ${q.options.map((opt, i) => `
          <button 
            class="option ${selectedOption === i ? 'selected' : ''} ${answered && state.showExplanations[state.currentQuestion] ? (i === q.correct ? 'correct' : i === selectedOption ? 'incorrect' : '') : ''}"
            onclick="selectOption(${i})"
            ${answered && state.showExplanations[state.currentQuestion] ? 'disabled' : ''}
          >
            <span class="option-radio"></span>
            <span class="option-text">${escapeHtml(opt)}</span>
          </button>
        `).join('')}
      </div>

      ${answered && state.showExplanations[state.currentQuestion] ? `
        <div class="explanation show">
          <div class="explanation-title">
            ${selectedOption === q.correct ? '✓ Correct!' : '✗ Incorrect'}
          </div>
          <div>${escapeHtml(q.explanation)}</div>
          ${selectedOption !== q.correct ? `<div style="margin-top: 12px;">Correct answer: <strong>${escapeHtml(q.options[q.correct])}</strong></div>` : ''}
        </div>
      ` : ''}

      <div class="buttons">
        ${!answered ? `
          <button class="btn btn-secondary" onclick="skipQuestion()" style="flex: 1;">Skip</button>
        ` : `
          <button class="btn btn-primary" onclick="showExplanation()" style="flex: 1;">
            ${state.showExplanations[state.currentQuestion] ? '✓ Explanation Shown' : 'Show Explanation'}
          </button>
        `}
      </div>

      <div class="buttons" style="margin-top: 12px;">
        <button class="btn btn-secondary" onclick="previousQuestion()" ${state.currentQuestion === 0 ? 'disabled' : ''}>
          ← Previous
        </button>
        <div style="flex: 1;"></div>
        <button class="btn btn-secondary" onclick="nextQuestion()" ${state.currentQuestion === quizData.length - 1 ? 'disabled' : ''}>
          Next →
        </button>
        ${answered ? `
          <button class="btn btn-primary" onclick="finishQuiz()" style="margin-left: 12px;">
            ${state.currentQuestion === quizData.length - 1 ? 'View Results' : 'Jump to Results'}
          </button>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById('questionContent').innerHTML = html;
  updateSidebar();
  updateProgress();
}

function selectOption(index) {
  state.answers[state.currentQuestion] = index;
  renderQuestion();
}

function skipQuestion() {
  nextQuestion();
}

function showExplanation() {
  state.showExplanations[state.currentQuestion] = true;
  renderQuestion();
}

function nextQuestion() {
  if (state.currentQuestion < quizData.length - 1) {
    state.currentQuestion++;
    renderQuestion();
  }
}

function previousQuestion() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    renderQuestion();
  }
}

function goToQuestion(index) {
  state.currentQuestion = index;
  renderQuestion();
}

function updateSidebar() {
  document.querySelectorAll('.quiz-item').forEach((item, i) => {
    item.classList.toggle('active', i === state.currentQuestion);
  });
}

function updateProgress() {
  const answered = Object.keys(state.answers).length;
  const correct = Object.entries(state.answers).filter(([idx, ans]) => 
    ans === quizData[idx].correct
  ).length;

  const percentage = (answered / quizData.length) * 100;
  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('correctCount').textContent = correct;
}

function finishQuiz() {
  const answered = Object.keys(state.answers).length;
  if (answered === 0) {
    alert('Please answer at least one question before submitting!');
    return;
  }

  state.quizComplete = true;
  showResults();
}

function showResults() {
  const correct = Object.entries(state.answers).filter(([idx, ans]) => 
    ans === quizData[idx].correct
  ).length;
  const total = quizData.length;
  const answered = Object.keys(state.answers).length;
  const percentage = Math.round((correct / total) * 100);

  document.getElementById('finalScore').textContent = correct;
  document.getElementById('totalQuestions').textContent = total;
  document.getElementById('correctStat').textContent = correct;
  document.getElementById('incorrectStat').textContent = answered - correct;
  document.getElementById('percentageStat').textContent = percentage + '%';

  const resultsList = document.getElementById('resultsList');
  resultsList.innerHTML = quizData.map((q, idx) => {
    const answered = state.answers[idx] !== undefined;
    const isCorrect = state.answers[idx] === q.correct;
    const selectedOpt = state.answers[idx];

    return `
      <div class="result-item ${answered && isCorrect ? 'correct' : 'incorrect'}">
        <div class="result-question">Q${idx + 1}: ${q.title}</div>
        ${answered ? `
          <div class="result-status ${isCorrect ? 'correct' : 'incorrect'}">
            ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
          </div>
          <div class="result-details">
            <div>
              <span class="result-label">Your answer:</span>
              <span class="result-value">${escapeHtml(q.options[selectedOpt])}</span>
            </div>
            ${!isCorrect ? `
              <div>
                <span class="result-label">Correct:</span>
                <span class="result-value">${escapeHtml(q.options[q.correct])}</span>
              </div>
            ` : ''}
          </div>
        ` : `
          <div style="color: var(--text-dim); font-size: 12px;">Not attempted</div>
        `}
      </div>
    `;
  }).join('');

  document.getElementById('questionsView').style.display = 'none';
  document.getElementById('resultsView').classList.add('show');
}

function restartQuiz() {
  state.currentQuestion = 0;
  state.answers = {};
  state.showExplanations = {};
  state.quizComplete = false;

  document.getElementById('questionsView').style.display = 'block';
  document.getElementById('resultsView').classList.remove('show');
  renderQuestion();
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Initialize
init();
</script>
